<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USSD Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* ─── PHONE ─────────────────────────────── */
        .phone {
            width: 320px;
            background: #2d2d2d;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .phone-speaker {
            width: 60px;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin: 0 auto 15px;
        }

        .phone-screen {
            background: #0a3d0a;
            border-radius: 8px;
            padding: 20px;
            min-height: 280px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #00ff00;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 15px;
            position: relative;
        }

        .phone-screen .status-bar {
            font-size: 11px;
            color: #00aa00;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .phone-screen .content {
            min-height: 200px;
        }

        .phone-screen .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .phone-input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .phone-input-area input {
            flex: 1;
            background: #444;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        .phone-input-area input:focus {
            border-color: #4CAF50;
        }

        .phone-input-area button {
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .phone-input-area button:hover { background: #45a049; }
        .phone-input-area button:active { transform: scale(0.95); }

        .phone-actions {
            display: flex;
            gap: 8px;
        }

        .phone-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-dial {
            background: #4CAF50;
            color: white;
        }

        .btn-end {
            background: #f44336;
            color: white;
        }

        .btn-clear {
            background: #555;
            color: white;
        }

        .phone-actions button:hover { opacity: 0.9; }

        .phone-home {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #444;
            margin: 15px auto 0;
        }

        /* ─── SETTINGS PANEL ───────────────────── */
        .settings {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            width: 300px;
        }

        .settings h3 {
            margin-bottom: 15px;
            color: #8892b0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .settings label {
            display: block;
            color: #8892b0;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .settings input {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }

        .settings input:focus { border-color: #4CAF50; }

        .session-info {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .session-info h4 {
            color: #8892b0;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .session-info p {
            color: #ccd6f6;
            font-size: 13px;
            margin-bottom: 5px;
            font-family: monospace;
        }

        .session-info .active { color: #4CAF50; }
        .session-info .ended { color: #f44336; }

        /* ─── LOG PANEL ────────────────────────── */
        .log-panel {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            width: 350px;
            max-height: 600px;
        }

        .log-panel h3 {
            margin-bottom: 15px;
            color: #8892b0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-entries {
            max-height: 500px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #1a1a2e;
            color: #8892b0;
        }

        .log-entry .dir { font-weight: bold; }
        .log-entry .dir.out { color: #4CAF50; }
        .log-entry .dir.in { color: #64b5f6; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Settings -->
        <div class="settings">
            <h3>Phone Settings</h3>

            <label>Phone Number</label>
            <input type="text" id="phoneNumber" value="+254700000001" />

            <label>Service Code</label>
            <input type="text" id="serviceCode" value="*384#" />

            <div class="session-info">
                <h4>Session</h4>
                <p>Status: <span id="sessionStatus" class="ended">No session</span></p>
                <p>ID: <span id="sessionId">-</span></p>
                <p>Screen: <span id="currentScreen">-</span></p>
            </div>

            <div style="margin-top:20px">
                <h4 style="color:#8892b0;font-size:12px;text-transform:uppercase;margin-bottom:10px">Demo Accounts</h4>
                <p style="color:#ccd6f6;font-size:12px;font-family:monospace;margin-bottom:3px">+254700000001 PIN: 1234</p>
                <p style="color:#ccd6f6;font-size:12px;font-family:monospace;margin-bottom:3px">+254700000002 PIN: 5678</p>
                <p style="color:#ccd6f6;font-size:12px;font-family:monospace">+254700000003 PIN: 4321</p>
            </div>
        </div>

        <!-- Phone -->
        <div class="phone">
            <div class="phone-speaker"></div>
            <div class="phone-screen">
                <div class="status-bar">
                    <span>M-Wallet USSD</span>
                    <span id="clock"></span>
                </div>
                <div class="content" id="screenContent">
                    Dial *384# to start
                </div>
            </div>
            <div class="phone-input-area">
                <input type="text" id="userInput" placeholder="Enter response..."
                       autocomplete="off" />
                <button onclick="sendInput()">Send</button>
            </div>
            <div class="phone-actions">
                <button class="btn-dial" onclick="dial()">Dial *384#</button>
                <button class="btn-end" onclick="endCall()">End</button>
                <button class="btn-clear" onclick="clearLog()">Clear</button>
            </div>
            <div class="phone-home"></div>
        </div>

        <!-- Log -->
        <div class="log-panel">
            <h3>Request Log</h3>
            <div class="log-entries" id="logEntries"></div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let sessionActive = false;

        function generateSessionId() {
            return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function dial() {
            sessionId = generateSessionId();
            sessionActive = true;

            updateSessionInfo();

            const phone = document.getElementById('phoneNumber').value;
            const code = document.getElementById('serviceCode').value;

            await sendRequest('');
        }

        async function sendInput() {
            const input = document.getElementById('userInput').value.trim();
            if (!input || !sessionActive) return;

            document.getElementById('userInput').value = '';
            await sendRequest(input);
        }

        async function sendRequest(input) {
            const phone = document.getElementById('phoneNumber').value;
            const code = document.getElementById('serviceCode').value;

            const body = {
                sessionId: sessionId,
                phoneNumber: phone,
                serviceCode: code,
                input: input
            };

            addLog('out', `Input: "${input || '(dial)'}"  Session: ${sessionId.substr(-8)}`);

            try {
                const resp = await fetch('/ussd/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await resp.json();

                document.getElementById('screenContent').textContent = data.message;
                addLog('in', data.message.replace(/\n/g, ' | '));

                if (!data.continueSession) {
                    sessionActive = false;
                    setTimeout(() => {
                        document.getElementById('screenContent').textContent =
                            'Session ended.\n\nDial *384# to start again.';
                    }, 3000);
                }

                updateSessionInfo();

            } catch (err) {
                document.getElementById('screenContent').textContent = 'Error: ' + err.message;
                addLog('in', 'ERROR: ' + err.message);
            }
        }

        function endCall() {
            sessionActive = false;
            sessionId = null;
            document.getElementById('screenContent').textContent = 'Call ended.\n\nDial *384# to start.';
            updateSessionInfo();
        }

        function updateSessionInfo() {
            const status = document.getElementById('sessionStatus');
            status.textContent = sessionActive ? 'Active' : 'No session';
            status.className = sessionActive ? 'active' : 'ended';

            document.getElementById('sessionId').textContent =
                sessionId ? sessionId.substr(-12) : '-';
        }

        function addLog(dir, message) {
            const log = document.getElementById('logEntries');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const time = new Date().toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });

            entry.innerHTML = `<span class="dir ${dir}">${dir === 'out' ? '>>>' : '<<<'}</span> ` +
                `<span style="color:#555">${time}</span> ${message}`;

            log.prepend(entry);
        }

        function clearLog() {
            document.getElementById('logEntries').innerHTML = '';
        }

        // Enter key sends input
        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendInput();
        });
    </script>
</body>
</html>
