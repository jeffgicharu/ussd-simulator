spring:
  application:
    name: ussd-simulator
  datasource:
    url: jdbc:h2:mem:ussddb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8181

ussd:
  service-code: "*384#"
  session-timeout-seconds: 180
  max-sessions: 10000

  # Wallet API integration (optional)
  wallet-api:
    base-url: http://localhost:8080
    enabled: false
